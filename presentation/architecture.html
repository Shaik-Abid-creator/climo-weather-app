<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVVM Architecture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding-top: 60px;
            padding-left: 80px;
            padding-right: 80px;
        }

        .title {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #111827;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .subtitle-line { width: 60px; height: 4px; background: #0284C7; margin-bottom: 40px; }

        .content {
            flex: 1;
            padding-left: 80px;
            padding-right: 80px;
            padding-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .architecture-stack {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px; /* slightly reduced gap */
        }

        .layer {
            border: 2px solid #111827;
            padding: 12px; /* reduced inner padding to shrink overall height */
            background: #FFFFFF;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .layer.highlight { background: #F0F4FF; }

        .layer-title {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #0284C7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .layer-content {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #374151;
            line-height: 1.5;
        }

        .connector {
            height: 0;
            border-left: 2px solid #0284C7;
            margin: 0 auto;
            width: 2px;
        }

        .geometric-accent { position: absolute; width: 250px; height: 250px; background: #0284C7; top: 100px; left: -80px; opacity: 0.05; z-index: 0; }
        .geometric-accent-2 { position: absolute; width: 200px; height: 200px; background: #0284C7; bottom: 80px; right: -60px; opacity: 0.04; z-index: 0; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="geometric-accent"></div>
        <div class="geometric-accent-2"></div>
        
        <div class="header">
            <h1 class="title">MVVM Architecture</h1>
            <div class="subtitle-line"></div>
        </div>

        <div class="content">
            <div class="architecture-stack">
                <div class="layer highlight">
                    <div class="layer-title">UI Layer</div>
                    <div class="layer-content">Jetpack Compose Screens &amp; Components</div>
                </div>

                <div class="connector"></div>

                <div class="layer highlight">
                    <div class="layer-title">ViewModel</div>
                    <div class="layer-content">StateFlow State Management &amp; Business Logic</div>
                </div>

                <div class="connector"></div>

                <div class="layer">
                    <div class="layer-title">Repository</div>
                    <div class="layer-content">Data Access Abstraction &amp; Error Handling</div>
                </div>

                <div class="connector"></div>

                <div class="layer">
                    <div class="layer-title">Network Layer</div>
                    <div class="layer-content">Retrofit Service &amp; OkHttp Configuration</div>
                </div>

                <div class="connector"></div>

                <div class="layer">
                    <div class="layer-title">External API</div>
                    <div class="layer-content">Open-Meteo API (Free, No Authentication)</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
