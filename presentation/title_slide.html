<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climo Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .geometric-accent {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #0284C7;
            border-radius: 50%;
            top: -100px;
            right: -100px;
            opacity: 0.1;
            z-index: 0;
        }

        .geometric-accent-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #0284C7;
            bottom: -80px;
            left: -80px;
            opacity: 0.08;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 80px;
            max-width: 800px;
        }

        .title {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 72px;
            font-weight: 900;
            color: #111827;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: #0284C7;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .description {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #374151;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .accent-line {
            width: 80px;
            height: 4px;
            background: #0284C7;
            margin-top: 32px;
        }

        .tech-stack {
            display: flex;
            gap: 16px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .tech-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #F3F4F6;
            border: 2px solid #0284C7;
            border-radius: 4px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #0284C7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="geometric-accent"></div>
        <div class="geometric-accent-2"></div>
        
        <div class="content">
            <h1 class="title">Climo Weather App</h1>
            <h2 class="subtitle">Production-Ready Native Android Application</h2>
            <p class="description">
                A modern weather application demonstrating best practices in native Android development with clean architecture, reactive state management, and Material 3 design.
            </p>
            <div class="accent-line"></div>
            <div class="tech-stack">
                <span class="tech-badge">Jetpack Compose</span>
                <span class="tech-badge">Kotlin</span>
                <span class="tech-badge">MVVM</span>
                <span class="tech-badge">StateFlow</span>
                <span class="tech-badge">Material 3</span>
            </div>
        </div>
    </div>
</body>
</html>
