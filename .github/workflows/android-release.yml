name: Android Release Build

on:
  workflow_dispatch:

jobs:
  assemble-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_B64" ]; then
            echo "Missing RELEASE_KEYSTORE_B64 secret" >&2
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_B64" | base64 --decode > release-keystore.jks

      - name: Create keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<PROPS
          storeFile=release-keystore.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          PROPS

      - name: Run checks
        run: gradle test lint --no-daemon

      - name: Assemble release APK
        run: gradle assembleRelease --no-daemon

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
